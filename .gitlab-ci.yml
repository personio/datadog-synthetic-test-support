include:
  project: dx/pipelines
  file:
    - /jobs/sonarscan-dev-edition.yml
    - /jobs/approvabot.yml

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - when: always

stages:
  - build
  - post-build
  - publish

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  ENABLE_APPROVABOT: "true"

lint:
  image: 824725208937.dkr.ecr.eu-central-1.amazonaws.com/personio-jdk:1.3.0
  stage: build
  script:
    - ./gradlew ktlintCheck

test:unit:
  image: 824725208937.dkr.ecr.eu-central-1.amazonaws.com/personio-jdk:1.3.0
  stage: build
  tags:
    - dev
  script:
    - ./gradlew test jacocoTestReport
  artifacts:
    paths:
      - build/test-results/test/xml/jacocoReport.xml
    expire_in: 1 day

dd:keys:
  stage: build
  tags:
    - dev
  script:
    - |
      SECRETS_FILE="ops/env/dev/secrets.yaml"
      echo "DD_API_KEY=$(sops -d --extract '["dd_api_key"]' $SECRETS_FILE)" > dd.env
      echo "DD_APP_KEY=$(sops -d --extract '["dd_app_key"]' $SECRETS_FILE)" >> dd.env
  artifacts:
    reports:
      dotenv: dd.env
  variables:
    AWS_PROFILE: dev

test:e2e:
  image: 824725208937.dkr.ecr.eu-central-1.amazonaws.com/personio-jdk:1.3.0
  stage: post-build
  script:
    - ./gradlew e2eTest
  dependencies:
    - dd:keys

sonarscan:
  extends:
    - .sonarscan-kotlin
  stage: post-build
  needs:
    - test:unit

.publish:
  stage: publish
  image: 824725208937.dkr.ecr.eu-central-1.amazonaws.com/personio-jdk:1.3.0
  tags:
    - dev

publishSnapshot:
  extends:
    - .publish
  script:
    - ./gradlew publish

publishRelease:
  extends:
    - .publish
  only:
    - master
  when: manual
  script:
    - ./gradlew publish -Prelease
